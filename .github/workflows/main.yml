name: Run Telegram Bot

on:
  schedule:
    - cron: '*/5 * * * *' # يعمل تلقائياً كل 5 دقائق
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install puppeteer

      - name: Run Bot Script
        env:
          STREAM_URL: "https://july-marcus-scotland-stat.trycloudflare.com/live/live/index.m3u8"
        run: node bot.js

      - name: Commit and Push Thumbnail
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live-thumb.jpg || true
          git commit -m "تحديث الصورة المصغرة للبث المباشر 📸" || true
          git push origin main || true
